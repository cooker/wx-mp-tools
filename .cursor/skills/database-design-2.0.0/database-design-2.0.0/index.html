<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL 业务模板展示</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="panel left">
      <div class="header">SQL 业务模板</div>
      <div class="tools">
        <input id="searchInput" placeholder="搜索模板名称/编码..." />
        <select id="typeSelect">
          <option value="">全部分类</option>
        </select>
      </div>
      <div id="templateList" class="template-list"></div>
    </aside>

    <main class="panel right">
      <div class="header">模板详情</div>
      <div class="detail">
        <div id="templateTitle" class="title">加载中...</div>
        <div id="templateDesc" class="desc">正在读取本地 MD 模板。</div>
      </div>
      <div id="tabs" class="tabs"></div>
      <div id="content" class="content"></div>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
